name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_MAPTILER_KEY: ${{ secrets.NEXT_PUBLIC_MAPTILER_KEY }}
          NEXT_PUBLIC_STADIA_API_KEY: ${{ secrets.NEXT_PUBLIC_STADIA_API_KEY }}
          NEXT_PUBLIC_TOMTOM_API_KEY: placeholder
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_CESIUM_TOKEN: placeholder
          OPENROUTER_API_KEY: placeholder
          OPENWEATHER_API_KEY: placeholder
